{% extends "base.html" %}

{% block title %}Delete {{ shopping_list.name }} — AIppetite{% endblock %}

{% block content %}
    <h1>Delete "{{ shopping_list.name }}"?</h1>
    <p>This cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
        <a href="{% url 'shopping_list_detail' shopping_list.pk %}">Cancel</a>
    </form>
{% endblock %}
